name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'migrations/**'
              - 'sandbox/**'
              - 'docker-compose.prod.yml'
              - 'scripts/deploy.sh'
              - 'nginx/**'
            frontend:
              - 'frontend/**'
              - 'nginx/**'
              - 'scripts/deploy.sh'

      - name: Set up Node.js
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dist
        if: steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build || (
            npm i --no-save @rollup/rollup-linux-x64-gnu
            npm run build
          )

      - name: Copy frontend dist to server
        if: steps.changes.outputs.frontend == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "${{ secrets.DEPLOY_PATH }}/frontend/dist"
          strip_components: 2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin main
            chmod +x scripts/deploy.sh

            if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
              echo "Backend-related changes detected -> full stack deploy with migrations"
              ./scripts/deploy.sh full-stack
            else
              echo "No backend changes detected -> frontend fast deploy using CI-built dist"
              ./scripts/deploy.sh frontend-fast
            fi
