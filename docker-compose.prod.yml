version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: pypycode_nginx
    ports:
      - "8084:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - pypycode-server

  frontend_builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: builder
    container_name: pypycode_frontend_builder
    command: sh -c "npm run build && cp -r dist/* /usr/share/nginx/html/"
    volumes:
      - frontend_build:/usr/share/nginx/html
    networks:
      - pypycode-server

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pypycode_api
    command: gunicorn -w 4 -b 0.0.0.0:5000 "app:create_app()"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pypycode-server

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pypycode_worker
    command: celery -A app.celery_app worker --loglevel=warning --concurrency=8
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SANDBOX_IMAGE=pypycode-sandbox:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pypycode-server

  redis:
    image: redis:7-alpine
    container_name: pypycode_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - pypycode-server

volumes:
  redisdata:
  frontend_build:

networks:
  pypycode-server:
    driver: bridge
